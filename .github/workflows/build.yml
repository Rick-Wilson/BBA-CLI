name: Build BBA-Tools

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-linux-x64:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout BBA-Tools
        uses: actions/checkout@v4
        with:
          path: BBA-Tools

      - name: Checkout Bridge-Parsers (for CLI PBN/hand analysis)
        uses: actions/checkout@v4
        with:
          repository: rick-wilson/Bridge-Parsers
          path: Bridge-Parsers

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build bba-cli
        run: |
          cd BBA-Tools/bba-cli
          cargo build --release

      - name: Build bba-server
        run: |
          cd BBA-Tools/bba-server
          cargo build --release

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bba-linux-x64
          path: |
            BBA-Tools/bba-cli/target/release/bba-cli
            BBA-Tools/bba-server/target/release/bba-server
            BBA-Tools/epbot-libs/linux/x64/libEPBot.so

  build-linux-arm64:
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Checkout BBA-Tools
        uses: actions/checkout@v4
        with:
          path: BBA-Tools

      - name: Checkout Bridge-Parsers
        uses: actions/checkout@v4
        with:
          repository: rick-wilson/Bridge-Parsers
          path: Bridge-Parsers

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build bba-cli
        run: |
          cd BBA-Tools/bba-cli
          cargo build --release

      - name: Build bba-server
        run: |
          cd BBA-Tools/bba-server
          cargo build --release

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bba-linux-arm64
          path: |
            BBA-Tools/bba-cli/target/release/bba-cli
            BBA-Tools/bba-server/target/release/bba-server
            BBA-Tools/epbot-libs/linux/arm64/libEPBot.so

  build-macos-arm64:
    runs-on: macos-latest
    steps:
      - name: Checkout BBA-Tools
        uses: actions/checkout@v4
        with:
          path: BBA-Tools

      - name: Checkout Bridge-Parsers
        uses: actions/checkout@v4
        with:
          repository: rick-wilson/Bridge-Parsers
          path: Bridge-Parsers

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build bba-cli
        run: |
          cd BBA-Tools/bba-cli
          cargo build --release

      - name: Build bba-server
        run: |
          cd BBA-Tools/bba-server
          cargo build --release

      # Code-signing + notarization: required so macOS Gatekeeper accepts
      # downloaded binaries without the right-click-Open dance. Both
      # executables and the bundled libEPBot.dylib must be signed by the
      # same Developer ID, otherwise hardened-runtime library validation
      # rejects the dylib at load time.
      - name: Import Developer ID certificate
        env:
          DEVELOPER_ID_CERT_BASE64: ${{ secrets.DEVELOPER_ID_CERT_BASE64 }}
          DEVELOPER_ID_CERT_PASSWORD: ${{ secrets.DEVELOPER_ID_CERT_PASSWORD }}
        run: |
          echo "$DEVELOPER_ID_CERT_BASE64" | base64 --decode > certificate.p12
          security create-keychain -p actions build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p actions build.keychain
          security import certificate.p12 -k build.keychain \
            -P "$DEVELOPER_ID_CERT_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k actions build.keychain
          rm certificate.p12

      - name: Sign macOS binaries
        run: |
          BBA_CLI=BBA-Tools/bba-cli/target/release/bba-cli
          BBA_SERVER=BBA-Tools/bba-server/target/release/bba-server
          LIBEPBOT=BBA-Tools/epbot-libs/macos/arm64/libEPBot.dylib

          # Stage a writable copy of the dylib alongside the binaries so
          # the signed copy is what we package, without polluting the
          # checked-in epbot-libs/.
          STAGED_LIB=BBA-Tools/bba-cli/target/release/libEPBot.dylib
          cp "$LIBEPBOT" "$STAGED_LIB"

          for bin in "$BBA_CLI" "$BBA_SERVER" "$STAGED_LIB"; do
            codesign --force --options runtime --timestamp \
              --sign "Developer ID Application" "$bin"
            codesign --verify --verbose "$bin"
          done

      - name: Notarize macOS binaries
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          BBA_CLI=BBA-Tools/bba-cli/target/release/bba-cli
          BBA_SERVER=BBA-Tools/bba-server/target/release/bba-server
          STAGED_LIB=BBA-Tools/bba-cli/target/release/libEPBot.dylib

          # Notarize all three in a single submission: zip them together,
          # submit, wait for Apple to register the ticket. Raw binaries
          # don't support stapling — once notarized, the OS looks up the
          # ticket online on first launch, after which it's cached locally.
          zip -j notarize.zip "$BBA_CLI" "$BBA_SERVER" "$STAGED_LIB"

          xcrun notarytool submit notarize.zip \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_ID_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait
          rm notarize.zip

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bba-macos-arm64
          path: |
            BBA-Tools/bba-cli/target/release/bba-cli
            BBA-Tools/bba-server/target/release/bba-server
            BBA-Tools/bba-cli/target/release/libEPBot.dylib

  build-windows-x64:
    runs-on: windows-latest
    steps:
      - name: Checkout BBA-Tools
        uses: actions/checkout@v4
        with:
          path: BBA-Tools

      - name: Checkout Bridge-Parsers
        uses: actions/checkout@v4
        with:
          repository: rick-wilson/Bridge-Parsers
          path: Bridge-Parsers

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build bba-cli
        run: |
          cd BBA-Tools/bba-cli
          cargo build --release

      - name: Build bba-server
        run: |
          cd BBA-Tools/bba-server
          cargo build --release

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bba-windows-x64
          path: |
            BBA-Tools/bba-cli/target/release/bba-cli.exe
            BBA-Tools/bba-server/target/release/bba-server.exe
            BBA-Tools/epbot-libs/windows/x64/EPBot.dll

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-linux-x64, build-linux-arm64, build-macos-arm64, build-windows-x64]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Package releases
        run: |
          cd artifacts

          # Each artifact preserves the directory structure from the upload paths.
          # Flatten into release directories.

          # Linux x64
          mkdir -p release-linux-x64
          find bba-linux-x64 -name 'bba-cli' -exec cp {} release-linux-x64/ \;
          find bba-linux-x64 -name 'bba-server' -exec cp {} release-linux-x64/ \;
          find bba-linux-x64 -name 'libEPBot.so' -exec cp {} release-linux-x64/ \;
          chmod +x release-linux-x64/bba-cli release-linux-x64/bba-server
          tar czf bba-${{ github.ref_name }}-linux-x64.tar.gz -C release-linux-x64 .

          # Linux arm64
          mkdir -p release-linux-arm64
          find bba-linux-arm64 -name 'bba-cli' -exec cp {} release-linux-arm64/ \;
          find bba-linux-arm64 -name 'bba-server' -exec cp {} release-linux-arm64/ \;
          find bba-linux-arm64 -name 'libEPBot.so' -exec cp {} release-linux-arm64/ \;
          chmod +x release-linux-arm64/bba-cli release-linux-arm64/bba-server
          tar czf bba-${{ github.ref_name }}-linux-arm64.tar.gz -C release-linux-arm64 .

          # macOS arm64
          mkdir -p release-macos-arm64
          find bba-macos-arm64 -name 'bba-cli' -exec cp {} release-macos-arm64/ \;
          find bba-macos-arm64 -name 'bba-server' -exec cp {} release-macos-arm64/ \;
          find bba-macos-arm64 -name 'libEPBot.dylib' -exec cp {} release-macos-arm64/ \;
          chmod +x release-macos-arm64/bba-cli release-macos-arm64/bba-server
          tar czf bba-${{ github.ref_name }}-macos-arm64.tar.gz -C release-macos-arm64 .

          # Windows x64
          mkdir -p release-windows-x64
          find bba-windows-x64 -name 'bba-cli.exe' -exec cp {} release-windows-x64/ \;
          find bba-windows-x64 -name 'bba-server.exe' -exec cp {} release-windows-x64/ \;
          find bba-windows-x64 -name 'EPBot.dll' -exec cp {} release-windows-x64/ \;
          cd release-windows-x64 && zip ../bba-${{ github.ref_name }}-windows-x64.zip * && cd ..

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/bba-${{ github.ref_name }}-linux-x64.tar.gz
            artifacts/bba-${{ github.ref_name }}-linux-arm64.tar.gz
            artifacts/bba-${{ github.ref_name }}-macos-arm64.tar.gz
            artifacts/bba-${{ github.ref_name }}-windows-x64.zip
          generate_release_notes: true

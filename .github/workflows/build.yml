name: Build BBA-Tools

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-linux-x64:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout BBA-Tools
        uses: actions/checkout@v4
        with:
          path: BBA-Tools

      - name: Checkout Bridge-Parsers (for CLI PBN/hand analysis)
        uses: actions/checkout@v4
        with:
          repository: rick-wilson/Bridge-Parsers
          path: Bridge-Parsers

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build bba-cli
        run: |
          cd BBA-Tools/bba-cli
          cargo build --release

      - name: Build bba-server
        run: |
          cd BBA-Tools/bba-server
          cargo build --release

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bba-linux-x64
          path: |
            BBA-Tools/bba-cli/target/release/bba-cli
            BBA-Tools/bba-server/target/release/bba-server
            BBA-Tools/epbot-libs/linux/x64/libEPBot.so

  build-linux-arm64:
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Checkout BBA-Tools
        uses: actions/checkout@v4
        with:
          path: BBA-Tools

      - name: Checkout Bridge-Parsers
        uses: actions/checkout@v4
        with:
          repository: rick-wilson/Bridge-Parsers
          path: Bridge-Parsers

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build bba-cli
        run: |
          cd BBA-Tools/bba-cli
          cargo build --release

      - name: Build bba-server
        run: |
          cd BBA-Tools/bba-server
          cargo build --release

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bba-linux-arm64
          path: |
            BBA-Tools/bba-cli/target/release/bba-cli
            BBA-Tools/bba-server/target/release/bba-server
            BBA-Tools/epbot-libs/linux/arm64/libEPBot.so

  build-macos-arm64:
    runs-on: macos-latest
    steps:
      - name: Checkout BBA-Tools
        uses: actions/checkout@v4
        with:
          path: BBA-Tools

      - name: Checkout Bridge-Parsers
        uses: actions/checkout@v4
        with:
          repository: rick-wilson/Bridge-Parsers
          path: Bridge-Parsers

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build bba-cli
        run: |
          cd BBA-Tools/bba-cli
          cargo build --release

      - name: Build bba-server
        run: |
          cd BBA-Tools/bba-server
          cargo build --release

      # Code-signing + notarization: required so macOS Gatekeeper accepts
      # downloaded binaries without the right-click-Open dance. Both
      # executables and the bundled libEPBot.dylib must be signed by the
      # same Developer ID, otherwise hardened-runtime library validation
      # rejects the dylib at load time.
      - name: Import Developer ID certificate
        env:
          DEVELOPER_ID_CERT_BASE64: ${{ secrets.DEVELOPER_ID_CERT_BASE64 }}
          DEVELOPER_ID_CERT_PASSWORD: ${{ secrets.DEVELOPER_ID_CERT_PASSWORD }}
        run: |
          echo "$DEVELOPER_ID_CERT_BASE64" | base64 --decode > certificate.p12
          security create-keychain -p actions build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p actions build.keychain
          security import certificate.p12 -k build.keychain \
            -P "$DEVELOPER_ID_CERT_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k actions build.keychain
          rm certificate.p12

      - name: Stage and sign macOS binaries
        run: |
          BBA_CLI=BBA-Tools/bba-cli/target/release/bba-cli
          BBA_SERVER=BBA-Tools/bba-server/target/release/bba-server
          LIBEPBOT=BBA-Tools/epbot-libs/macos/arm64/libEPBot.dylib

          # Stage all three files in a single dmg-staging dir. Layout
          # inside is what the user sees when they mount the .dmg.
          mkdir -p dmg-staging
          cp "$BBA_CLI" "$BBA_SERVER" "$LIBEPBOT" dmg-staging/

          # Codesign each binary with hardened runtime — required for
          # notarization. The binaries' rpath points at @executable_path,
          # so libEPBot.dylib auto-loads from the same directory once
          # extracted by the user (no DYLD_LIBRARY_PATH needed).
          for f in dmg-staging/bba-cli dmg-staging/bba-server dmg-staging/libEPBot.dylib; do
            codesign --force --options runtime --timestamp \
              --sign "Developer ID Application" "$f"
            codesign --verify --verbose "$f"
          done

          # Drop in a short README. The "Bridge Utilities" Finder alias
          # is created in a separate step (it needs the target folder to
          # exist on disk at creation time, then we clean it up).
          cat > dmg-staging/README.txt <<EOF
          BBA-Tools — Bridge Bidding Analyzer

          Drag bba-cli, bba-server, and libEPBot.dylib onto the
          "Bridge Utilities" alias to install them into
          /Applications/Bridge Utilities/.

          If you don't have a "Bridge Utilities" folder, the alias will be
          broken — drag the files into /Applications/ or anywhere else
          you keep CLI tools. They just need to live in the same
          directory together.

          Run from Terminal:
            /Applications/Bridge\ Utilities/bba-cli --help

          Source: https://github.com/Rick-Wilson/BBA-Tools
          EOF

      - name: Create Bridge Utilities drag-target alias
        run: |
          # A Unix symlink to a folder doesn't accept Finder drag-drop
          # cleanly — only a true Finder alias (created via AppleScript)
          # does. The alias's target folder must exist on disk at
          # creation time so AppleScript can resolve it; we make a
          # placeholder, generate the alias, then clean up. The alias
          # records both a path and a bookmark; on the user's machine
          # the path-based fallback resolves to their real folder.
          sudo mkdir -p "/Applications/Bridge Utilities"

          STAGING_ABS="$(cd dmg-staging && pwd)"
          osascript <<APPLESCRIPT
          tell application "Finder"
              set targetFolder to POSIX file "/Applications/Bridge Utilities" as alias
              set aliasFile to make alias file at POSIX file "$STAGING_ABS" to targetFolder
              set name of aliasFile to "Bridge Utilities"
          end tell
          APPLESCRIPT

          sudo rmdir "/Applications/Bridge Utilities"
          ls -la dmg-staging/

      - name: Build, sign, notarize, and staple .dmg
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          DMG=BBA-Tools-${{ github.ref_name }}.dmg
          # UDZO = compressed read-only DMG. Standard for distribution.
          hdiutil create -volname "BBA-Tools" \
            -srcfolder dmg-staging \
            -ov -format UDZO "$DMG"

          # Sign the .dmg itself, then notarize. Notarizing a .dmg
          # notarizes everything inside in one submission.
          codesign --force --sign "Developer ID Application" --timestamp "$DMG"
          xcrun notarytool submit "$DMG" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_ID_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait

          # Stapling attaches the notarization ticket to the .dmg so
          # Gatekeeper accepts it offline and without first-launch
          # prompts — exactly what raw binaries can't have.
          xcrun stapler staple "$DMG"
          xcrun stapler validate "$DMG"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bba-macos-arm64
          path: BBA-Tools-${{ github.ref_name }}.dmg

  build-windows-x64:
    runs-on: windows-latest
    steps:
      - name: Checkout BBA-Tools
        uses: actions/checkout@v4
        with:
          path: BBA-Tools

      - name: Checkout Bridge-Parsers
        uses: actions/checkout@v4
        with:
          repository: rick-wilson/Bridge-Parsers
          path: Bridge-Parsers

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build bba-cli
        run: |
          cd BBA-Tools/bba-cli
          cargo build --release

      - name: Build bba-server
        run: |
          cd BBA-Tools/bba-server
          cargo build --release

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bba-windows-x64
          path: |
            BBA-Tools/bba-cli/target/release/bba-cli.exe
            BBA-Tools/bba-server/target/release/bba-server.exe
            BBA-Tools/epbot-libs/windows/x64/EPBot.dll

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-linux-x64, build-linux-arm64, build-macos-arm64, build-windows-x64]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Package releases
        run: |
          cd artifacts

          # Each artifact preserves the directory structure from the upload paths.
          # Flatten into release directories.

          # Linux x64
          mkdir -p release-linux-x64
          find bba-linux-x64 -name 'bba-cli' -exec cp {} release-linux-x64/ \;
          find bba-linux-x64 -name 'bba-server' -exec cp {} release-linux-x64/ \;
          find bba-linux-x64 -name 'libEPBot.so' -exec cp {} release-linux-x64/ \;
          chmod +x release-linux-x64/bba-cli release-linux-x64/bba-server
          tar czf bba-${{ github.ref_name }}-linux-x64.tar.gz -C release-linux-x64 .

          # Linux arm64
          mkdir -p release-linux-arm64
          find bba-linux-arm64 -name 'bba-cli' -exec cp {} release-linux-arm64/ \;
          find bba-linux-arm64 -name 'bba-server' -exec cp {} release-linux-arm64/ \;
          find bba-linux-arm64 -name 'libEPBot.so' -exec cp {} release-linux-arm64/ \;
          chmod +x release-linux-arm64/bba-cli release-linux-arm64/bba-server
          tar czf bba-${{ github.ref_name }}-linux-arm64.tar.gz -C release-linux-arm64 .

          # macOS arm64 — already a signed/notarized/stapled .dmg, just
          # rename to the release filename.
          cp bba-macos-arm64/BBA-Tools-${{ github.ref_name }}.dmg \
             bba-${{ github.ref_name }}-macos-arm64.dmg

          # Windows x64
          mkdir -p release-windows-x64
          find bba-windows-x64 -name 'bba-cli.exe' -exec cp {} release-windows-x64/ \;
          find bba-windows-x64 -name 'bba-server.exe' -exec cp {} release-windows-x64/ \;
          find bba-windows-x64 -name 'EPBot.dll' -exec cp {} release-windows-x64/ \;
          cd release-windows-x64 && zip ../bba-${{ github.ref_name }}-windows-x64.zip * && cd ..

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/bba-${{ github.ref_name }}-linux-x64.tar.gz
            artifacts/bba-${{ github.ref_name }}-linux-arm64.tar.gz
            artifacts/bba-${{ github.ref_name }}-macos-arm64.dmg
            artifacts/bba-${{ github.ref_name }}-windows-x64.zip
          generate_release_notes: true
